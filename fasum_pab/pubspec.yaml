name: fasum_pab
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/fasum_icon_512.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:   
    - assets/fasum_icon.jpg
    - assets/fasum_icon_512.jpg
